<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GlassTodo</title><link rel="stylesheet" href="style.css"></head>
<body>
<div id="titlebar" data-tauri-drag-region>
  <span id="title-text">🏓 GlassTodo</span>
  <div id="title-controls">
    <button class="title-btn" id="pin-btn" title="窗口置顶">📌</button>
    <button class="title-btn" id="min-btn" title="最小化">─</button>
    <button class="title-btn close-btn" id="close-btn" title="隐藏到托盘">✕</button>
  </div>
</div>

<div id="datebar">
  <div id="date-nav">
    <button class="nav-btn" id="prev-btn">‹</button>
    <span id="date-display"></span>
    <button class="nav-btn" id="next-btn">›</button>
    <button id="today-btn">今天</button>
  </div>
  <button id="refresh-btn">⟳</button>
</div>

<div id="task-area">
  <div id="task-list"><div class="empty-state" id="empty-state">☕ 没有待办，添加一个吧</div></div>
</div>

<div id="bottom-panel">
  <input type="text" id="task-input" placeholder="输入新待办..." autocomplete="off">
  <div id="reminder-type">
    <label class="radio-label"><input type="radio" name="rtype" value="once" checked><span>🔔 单次提醒</span></label>
    <label class="radio-label"><input type="radio" name="rtype" value="weekly"><span>🔁 每周提醒</span></label>
  </div>
  <div id="once-config" class="config-row">
    <input type="date" id="once-date"><span style="margin:0 4px;color:#999;font-size:12px">时间</span>
    <input type="time" id="once-time" value="14:30">
  </div>
  <div id="weekly-config" class="config-row" style="display:none">
    <span class="label">星期：</span>
    <button class="day-btn" data-day="1">一</button><button class="day-btn" data-day="2">二</button>
    <button class="day-btn" data-day="3">三</button><button class="day-btn" data-day="4">四</button>
    <button class="day-btn" data-day="5">五</button><button class="day-btn" data-day="6">六</button>
    <button class="day-btn" data-day="0">日</button>
    <span class="label" style="margin-left:8px">时间：</span>
    <input type="time" id="weekly-time" value="09:00">
  </div>
  <button id="add-btn">＋ 添加待办</button>
</div>
<script type="module" src="main.js"></script>
</body></html>
